<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Finanzas Personales</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: url('/static/images/939821c2479a5fda835f0f4ffa416354.jpg') center top / 60% auto no-repeat;
            position: relative;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, 
                rgba(9, 9, 11, 0.75) 0%, 
                rgba(9, 9, 11, 0.6) 30%,
                rgba(9, 9, 11, 0.75) 100%);
            z-index: 0;
        }
        
        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 400px;
            padding: 1rem;
        }
        
        .login-card {
            background: rgba(18, 18, 24, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.25rem;
            padding: 2rem;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            animation: fadeInUp 0.5s ease-out;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(25px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 1.75rem;
        }
        
        .login-header .icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #7c3aed 0%, #a78bfa 100%);
            border-radius: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            box-shadow: 0 10px 25px rgba(124, 58, 237, 0.4);
        }
        
        .login-header .icon i {
            font-size: 1.75rem;
            color: white;
        }
        
        .login-header h1 {
            font-size: 1.4rem;
            font-weight: 700;
            color: #f4f4f5;
            margin-bottom: 0.25rem;
        }
        
        .login-header p {
            color: #71717a;
            font-size: 0.9rem;
        }
        
        .form-label {
            color: #a1a1aa;
            font-weight: 500;
            margin-bottom: 0.4rem;
            font-size: 0.85rem;
        }
        
        .form-control {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.6rem;
            padding: 0.8rem 1rem;
            color: #f4f4f5;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }
        
        .form-control::placeholder {
            color: #52525b;
        }
        
        .form-control:focus {
            background: rgba(255, 255, 255, 0.12);
            border-color: #a78bfa;
            box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.2);
            outline: none;
            color: #f4f4f5;
        }
        
        .input-group {
            margin-bottom: 1rem;
        }
        
        .input-group-text {
            background: rgba(124, 58, 237, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-right: none;
            border-radius: 0.6rem 0 0 0.6rem;
            color: #a78bfa;
            padding: 0.8rem 1rem;
        }
        
        .input-group .form-control {
            border-radius: 0 0.6rem 0.6rem 0;
            border-left: none;
        }
        
        .input-group .form-control:focus {
            border-left: none;
        }
        
        .btn-login {
            background: linear-gradient(135deg, #7c3aed 0%, #8b5cf6 100%);
            border: none;
            border-radius: 0.6rem;
            padding: 0.9rem;
            font-weight: 600;
            font-size: 1rem;
            color: white;
            width: 100%;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.4);
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(124, 58, 237, 0.5);
        }
        
        .btn-login:active {
            transform: translateY(0);
        }
        
        .login-footer {
            text-align: center;
            margin-top: 1.25rem;
        }
        
        .login-footer a {
            color: #71717a;
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s ease;
        }
        
        .login-footer a:hover {
            color: #a78bfa;
        }
        
        .alert {
            border-radius: 0.6rem;
            padding: 0.9rem 1rem;
            margin-bottom: 1.25rem;
            border: none;
            font-size: 0.9rem;
        }
        
        .alert-danger {
            background: rgba(220, 38, 38, 0.15);
            color: #f87171;
            border-left: 3px solid #dc2626;
        }
        
        .alert-success {
            background: rgba(5, 150, 105, 0.15);
            color: #34d399;
            border-left: 3px solid #059669;
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }
        
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="icon">
                    <i class="fas fa-wallet"></i>
                </div>
                <h1>Finanzas Personales</h1>
                <p>Iniciá sesión para continuar</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ 'success' if category == 'success' else 'danger' }} alert-dismissible fade show" role="alert">
                            <i class="fas fa-{{ 'check-circle' if category == 'success' else 'exclamation-circle' }} me-2"></i>
                            {{ message }}
                            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="mb-3">
                    <label for="username" class="form-label">Usuario</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-user"></i></span>
                        <input type="text" class="form-control" id="username" name="username" required autofocus placeholder="Tu usuario">
                    </div>
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label">Contraseña</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                        <input type="password" class="form-control" id="password" name="password" required placeholder="Tu contraseña">
                    </div>
                </div>

                <button type="submit" class="btn btn-login">
                    <i class="fas fa-sign-in-alt me-2"></i>Ingresar
                </button>
            </form>

            <div class="login-footer">
                <a href="{{ url_for('configurar_usuario') }}">
                    <i class="fas fa-cog me-1"></i>Configurar usuario
                </a>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
